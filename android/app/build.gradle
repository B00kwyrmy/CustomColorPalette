apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Build APK and strip shared .so libraries already provided by PluginHost
def processCustomApk(String buildType) {
    def apkDir  = file("${buildDir}/outputs/apk/${buildType}")
    def origApk = file("${apkDir}/app-${buildType}.apk")
    def custApk = file("${apkDir}/app-${buildType}-custom.apk")
    if (!origApk.exists()) throw new GradleException("APK not found: ${origApk}")
    def tempDir = file("${buildDir}/temp/apk-custom-${buildType}")
    if (tempDir.exists()) delete tempDir
    tempDir.mkdirs()
    try {
        copy { from zipTree(origApk); into tempDir }
        def libDir = file("${tempDir}/lib")
        if (libDir.exists()) {
            libDir.listFiles().each { d -> if (d.isDirectory() && d.name != 'arm64-v8a') delete d }
            def arm64 = file("${tempDir}/lib/arm64-v8a")
            if (arm64.exists()) {
                ['libc++_shared.so','libfbjni.so','libhermes.so','libhermestooling.so',
                 'libimagepipeline.so','libjsi.so','libnative-filters.so',
                 'libnative-imagetranscoder.so','libreactnative.so'].each { n ->
                    def f = file("${arm64}/${n}"); if (f.exists()) delete f
                }
            }
        }
        ant.zip(destfile: custApk, basedir: tempDir)
        println "Custom APK: ${(custApk.length()/1024/1024).round(2)} MB"
    } finally { delete tempDir }
}

['Debug','Release'].each { v ->
    tasks.register("buildCustomApk${v}") {
        group = 'custom'; dependsOn "assemble${v}"
        doLast { processCustomApk(v.toLowerCase()) }
    }
}

react { autolinkLibrariesWithApp() }

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion
    namespace "com.customcolorpalette"
    defaultConfig {
        applicationId "com.customcolorpalette"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
